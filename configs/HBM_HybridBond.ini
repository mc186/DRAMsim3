# HBM with Hybrid Bonding (Cu-Cu direct bond) - 12-Hi Stack
# Based on SK Hynix HBM4E specifications and published research data
#
# References:
#   - NVIDIA HPCA 2017: "Architecting an Energy-Efficient DRAM System for GPUs"
#     Column energy: 1.5-5.7 pJ/bit depending on toggle rate
#   - MDPI Electronics 2025: "Thermal Issues Related to Hybrid Bonding of 3D-Stacked HBM"
#     Hybrid bonding reduces thermal resistance by 22.8-47% vs microbump
#   - Springer Nature 2025: "Cu-Cu hybrid bonding technology for 3D ICs"
#     Parasitic resistance <10 mOhm, contact resistance 1.2e-9 Ohm*cm^2
#   - Stanford DramDSE: First public validated HBM energy model
#
# NOTE: HBM uses wide PARALLEL TSV interface (NOT SerDes like GDDR/HMC)
# Energy savings from hybrid bonding come from reduced TSV capacitance and resistance

[dram_structure]
protocol = HBM_HYBRID
bankgroups = 4
banks_per_group = 4
rows = 16384
columns = 64
device_width = 128
BL = 2                      # Shorter burst (wider parallel transfer)
num_dies = 12               # 12-Hi stacking

[hybrid_bonding]
use_hybrid_bonding = true
tsv_count_per_channel = 2048    # vs ~512 for microbump HBM
tsv_capacitance_fF = 10         # vs 50-100 fF for microbump (Springer: 5-15 fF)
tsv_resistance_mOhm = 5         # vs 20-50 mOhm for microbump (Springer: <10 mOhm)
bond_pitch_um = 6               # vs 40-55 um for microbump (achievable: <10 um)
io_latency_cycles = 2           # Reduced due to shorter paths

[energy_decomposition]
# Based on NVIDIA HPCA 2017: HBM column energy = 1.5-5.7 pJ/bit
# Breakdown: core (row+column) + I/O driver + TSV switching + wire toggle
core_read_energy_pJ_per_bit = 3.0     # Row + column array energy
core_write_energy_pJ_per_bit = 3.5    # Row + column + write driver
# I/O energy reduced due to lower capacitance (CV^2 scaling)
# TSV capacitance reduction: 10fF vs 75fF = 87% reduction in C
io_energy_per_bit_pJ = 0.5            # I/O driver + termination
tsv_energy_per_bit_pJ = 0.3           # TSV switching (reduced C)
wire_energy_per_bit_pJ = 0.1          # Internal bus toggle energy

[timing]
tCK = 0.8                   # Faster clock possible
CL = 10                     # Reduced (lower RC delay)
CWL = 4
tRCDRD = 10
tRCDWR = 10
tRP = 12
tRAS = 28
tRFC = 220
tREFI = 3900
tREFIb = 128
tRPRE = 1
tWPRE = 1
tRRD_S = 3
tRRD_L = 5
tWTR_S = 5
tWTR_L = 7
tFAW = 24
tWR = 14
tCCD_S = 1
tCCD_L = 1
tXS = 220
tCKE = 6
tCKSRE = 8
tXP = 6
tRTP_L = 5
tRTP_S = 3

[power]
VDD = 1.1
IDD0 = 55
IDD2P = 24
IDD2N = 35
IDD3P = 35
IDD3N = 48
IDD4W = 350                 # Reduced I/O current (lower capacitance)
IDD4R = 270
IDD5AB = 220
IDD5PB = 4
IDD6x = 28

[system]
channel_size = 1024
channels = 16               # More channels for 12-Hi stack
bus_width = 128
address_mapping = rorabgbachco
queue_structure = PER_BANK
row_buf_policy = OPEN_PAGE
cmd_queue_size = 8
trans_queue_size = 32
unified_queue = false

[thermal]
# MDPI 2025: Hybrid bonding reduces thermal resistance by 22.8-47%
# Cu-Cu bond provides continuous thermal conduction path
bond_thermal_resistance = 0.5   # K*mm^2/W (lower than solder/MR-MUF)
die_thickness_um = 30           # Thinner dies (vs 50um for microbump)

[other]
epoch_period = 1000000
output_level = 1
