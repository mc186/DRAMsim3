# HBM with Hybrid Bonding (Cu-Cu direct bond) - 12-Hi Stack
# Based on SK Hynix HBM4E specifications and published research data
# References:
#   - MDPI Electronics 2025: Thermal Issues in Hybrid Bonding HBM
#   - Springer Nature 2025: Cu-Cu Hybrid Bonding Technology
#   - NVIDIA HPCA 2017: Energy-Efficient DRAM for GPUs
#   - TrendForce 2026: HBM4 Industry Roadmap

[dram_structure]
protocol = HBM_HYBRID
bankgroups = 4
banks_per_group = 4
rows = 16384
columns = 64
device_width = 128
BL = 2                      # Shorter burst length (parallel transfer via more TSVs)
num_dies = 12               # 12-Hi stacking

[hybrid_bonding]
use_hybrid_bonding = true
tsv_count_per_channel = 2048    # vs ~512 for microbump HBM
tsv_capacitance_fF = 10         # vs 50-100 fF for microbump
tsv_resistance_mOhm = 5         # vs 20-50 mOhm for microbump
bond_pitch_um = 6               # vs 40-55 um for microbump
io_latency_cycles = 2           # vs 8-10 cycles for microbump+SerDes

[energy_decomposition]
# Core energy unchanged by bonding technology
core_read_energy_pJ_per_bit = 3.0     # Array + sense amp
core_write_energy_pJ_per_bit = 3.5    # Array + write driver
# I/O energy significantly reduced (no SerDes, lower pad capacitance)
io_energy_per_bit_pJ = 0.5            # I/O driver (vs 2.0 for microbump)
tsv_energy_per_bit_pJ = 0.3           # TSV switching (vs 1.0 for microbump)
serdes_energy_per_bit_pJ = 0.0        # No SerDes for hybrid bonding!

[timing]
tCK = 0.8                   # Faster clock possible with hybrid bonding
CL = 10                     # Reduced (lower I/O latency)
CWL = 4
tRCDRD = 10                 # Reduced
tRCDWR = 10                 # Reduced
tRP = 12
tRAS = 28
tRFC = 220
tREFI = 3900
tREFIb = 128
tRPRE = 1
tWPRE = 1
tRRD_S = 3
tRRD_L = 5
tWTR_S = 5
tWTR_L = 7
tFAW = 24
tWR = 14
tCCD_S = 1                  # Tighter (no SerDes bottleneck)
tCCD_L = 1                  # Tighter (no SerDes bottleneck)
tXS = 220
tCKE = 6
tCKSRE = 8
tXP = 6
tRTP_L = 5
tRTP_S = 3

[power]
VDD = 1.1                   # Slightly lower voltage possible
IDD0 = 55                   # Reduced vs traditional HBM
IDD2P = 24
IDD2N = 35
IDD3P = 35
IDD3N = 48
IDD4W = 350                 # ~30% reduction (no SerDes)
IDD4R = 270                 # ~30% reduction
IDD5AB = 220
IDD5PB = 4
IDD6x = 28

[system]
channel_size = 1024
channels = 16               # More channels for 12-Hi stack
bus_width = 128
address_mapping = rorabgbachco
queue_structure = PER_BANK
row_buf_policy = OPEN_PAGE
cmd_queue_size = 8
trans_queue_size = 32
unified_queue = false

[thermal]
bond_thermal_resistance = 0.5   # K*mm^2/W (lower than solder/MR-MUF)
die_thickness_um = 30           # Thinner dies for hybrid bonding

[other]
epoch_period = 1000000
output_level = 1
