# HBM with Hybrid Bonding (Cu-Cu direct bond) - 16-Hi Stack
# Aggressive stacking configuration based on industry roadmaps
# References:
#   - SK Hynix 20-Hi HBM4E roadmap
#   - TrendForce 2026: 16-layer push by SK Hynix, Samsung, and Micron
#   - MDPI Electronics 2025: Thermal Issues in Hybrid Bonding HBM

[dram_structure]
protocol = HBM_HYBRID
bankgroups = 4
banks_per_group = 4
rows = 16384
columns = 64
device_width = 128
BL = 2                      # Shorter burst length (parallel transfer via more TSVs)
num_dies = 16               # 16-Hi stacking (aggressive)

[hybrid_bonding]
use_hybrid_bonding = true
tsv_count_per_channel = 4096    # Even more TSVs for 16-Hi
tsv_capacitance_fF = 8          # Further optimized for 16-Hi
tsv_resistance_mOhm = 4         # Lower resistance in advanced process
bond_pitch_um = 4               # Tighter pitch for advanced hybrid bonding
io_latency_cycles = 2           # Same I/O latency as 12-Hi

[energy_decomposition]
# Core energy unchanged by bonding technology
core_read_energy_pJ_per_bit = 3.0     # Array + sense amp
core_write_energy_pJ_per_bit = 3.5    # Array + write driver
# I/O energy reduced
io_energy_per_bit_pJ = 0.4            # I/O driver
tsv_energy_per_bit_pJ = 0.25          # TSV switching (optimized)
serdes_energy_per_bit_pJ = 0.0        # No SerDes for hybrid bonding

[timing]
tCK = 0.75                  # Even faster clock
CL = 12                     # Slightly higher for more layers
CWL = 5
tRCDRD = 11
tRCDWR = 11
tRP = 13
tRAS = 30
tRFC = 240                  # Slightly higher for more dies
tREFI = 3900
tREFIb = 120
tRPRE = 1
tWPRE = 1
tRRD_S = 3
tRRD_L = 5
tWTR_S = 5
tWTR_L = 7
tFAW = 24
tWR = 15
tCCD_S = 1
tCCD_L = 1
tXS = 248
tCKE = 7
tCKSRE = 9
tXP = 7
tRTP_L = 6
tRTP_S = 4

[power]
VDD = 1.1
IDD0 = 60                   # Slightly higher for more dies
IDD2P = 26
IDD2N = 38
IDD3P = 38
IDD3N = 52
IDD4W = 380                 # Slightly higher for 16-Hi
IDD4R = 295
IDD5AB = 240
IDD5PB = 5
IDD6x = 30

[system]
channel_size = 2048         # 2GB per channel for higher capacity
channels = 16               # 16 channels for 16-Hi stack
bus_width = 128
address_mapping = rorabgbachco
queue_structure = PER_BANK
row_buf_policy = OPEN_PAGE
cmd_queue_size = 8
trans_queue_size = 32
unified_queue = false

[thermal]
bond_thermal_resistance = 0.4   # K*mm^2/W (optimized for 16-Hi)
die_thickness_um = 25           # Even thinner dies for 16-Hi

[other]
epoch_period = 1000000
output_level = 1
